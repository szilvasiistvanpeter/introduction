name: Test and Deploy to Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: introduction/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Test (Typecheck)
        run: pnpm tsc

      - name: Build React App
        run: pnpm build

      # SPA Fix: A GitHub Pages-nek kell a 404.html, hogy a /about-on ne legyen hiba
      - name: Create 404 page for SPA
        run: cp dist/index.html dist/404.html

      # MkDocs Build
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs and Material theme
        run: pip install mkdocs-material

      - name: Build Documentation
        # A site-dir-t a React dist mappájába irányítjuk
        run: mkdocs build -f mkdocs.yml --site-dir dist/docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: introduction/dist

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
